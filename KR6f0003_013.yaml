body:
  text: 復次寂慧若諸菩薩為欲對治慳吝過失所緣法者即起能捨己之所有心住若為對治破戒過失所緣即起持戒心住若為對治瞋恚過失所緣即起堅固忍辱心住若為對治懈怠過失所緣即起精進成辦如來勝力心住若為對治散亂過失所緣即起獲得如來禪定心住若為對治染慧過失所緣即起圓滿無礙智心住若為聲聞作意所緣即起積集大乘心住若為厭離所緣即起不作諸罪心住若為惡趣所緣即起剎那所生諸惡趣中救度心住若為天趣作意所緣即起若成若壞後邊心住若為人趣作意所緣即起不堅固心住若為念佛作意所緣即起諸佛攝受心住若為念法作意所緣即起於法不吝心住若為念僧作意所緣即起獲得不退轉於法輪心住若為念捨作意所緣即起一切能捨心住若為念戒作意所緣即起圓滿求願勝定覺支心住若為念天作意所緣即起諸天稱讚佛智加持心住若為身作意所緣即起獲得佛身清淨心住若為語作意所緣即起獲得諸佛語言清淨心住若為心作意所緣即起獲得佛平等心清淨心住若為有為法所緣即起圓滿如來智心住若為無為法所緣即起圓滿佛智心住寂慧當知此如是等或有所緣而諸菩薩無有不於一切智智現前法門中住又諸菩薩於一切所緣法中皆悉回向菩提此即是名菩薩善巧方便覺了一切法通達觀察寂慧譬如所有三千大千世界一切大地隨諸所生無有不是一切衆生受用之所彼諸菩薩亦復如是所有一切所緣境界無有不是善巧方便菩薩共所受用菩提道分無不成熟菩提道法又如色法一切皆是四大所造善巧方便菩薩亦復如是或有所緣一切皆以菩提勝相和合相應復次寂慧若有衆生慳吝惡作者菩薩即為圓滿布施波羅蜜多持戒波羅蜜多若諸衆生起瞋恚行及懈怠者菩薩即為圓滿忍辱波羅蜜多精進波羅蜜多若諸衆生起散亂心及愚癡行者菩薩即為圓滿禪定波羅蜜多勝慧波羅蜜多若諸衆生不可悲愍者菩薩於彼無違害心若諸衆生所應饒益者菩薩於彼無隨順心若諸衆生常稱讚者菩薩於彼而無高心若諸衆生不稱讚者菩薩於彼亦無下心若見一切苦惱衆生菩薩即起大悲之心若見一切快樂衆生菩薩即起歡喜之心若見一切麁獷衆生菩薩即起調伏之心若見一切調順衆生菩薩即起慈愛之心若見具有緣力衆生菩薩即起衛護之心若見具有因力衆生菩薩即起攝化之心隨攝化已乃為教授若見智慧開明衆生菩薩即為宣說甚深之法若見具演說智衆生菩薩即為廣大說法若見如理衆生菩薩即為次第說法若見衆生樂著文句者菩薩即以少略文句而為說法若見衆生樂以奢摩他為先導者菩薩即為宣說毗鉢舍那若見衆生樂以毗鉢舍那為先導者菩薩即為宣說趣入三摩地法若見衆生樂持戒者菩薩先為宣說不究竟法後復為說地獄等事若見衆生樂多聞者即為宣說無疑惑法若見衆生樂三摩地者即為宣說趣入慧法若見衆生樂曠野住者即為宣說心寂靜法若見衆生樂修頭陀行者即為宣說聖慧根法若見鈍根衆生即為宣說聞隨順法若見堅著貪法衆生即為宣說不淨之法若見堅著瞋法衆生即為宣說慈心之法若見堅著癡法衆生即為宣說緣生之法若見等分行衆生即從中入中廣為說法所謂不淨法慈心法緣生法若隨順諸法所應度者菩薩即為宣說增上戒法增上心法增上慧法若見衆生以佛勝相所應度者即為宣說真實隨順菩提分法若見輕慢衆生所應度者先為杜止輕慢之門後為說法若見衆生相續樂觀菩薩聖相者菩薩即為常現其身然根未熟者不為說法若見衆生樂巧說法所應度者即以緣起譬喻解釋說法若見衆生樂甚深法所應度者即為宣說緣生無我無人無衆生法若有衆生著諸見者為說空法若見衆生起尋求行者即為宣說無相之法若見衆生起求願者即為宣說無願之法若見衆生著諸蘊者即為宣說如幻之法若見衆生著諸界者即為宣說善決擇法若見衆生著諸處者即為宣說如夢之法若見衆生著欲界者即為宣說逼惱之法若見衆生著色界者即為宣說諸行苦法若見衆生著無色界者即為宣說彼一切行無常之法若見衆生樂以苦法所應度者即為宣說令於聖種生歡喜法若見衆生樂以樂法所應度者為說無量禪定之法若見衆生樂天趣法所應度者即為宣說純一樂法若見衆生樂著諸相所應度者為說無我無取之法若見衆生樂以聲聞法所應度者即為教授取證之法若見衆生樂以緣覺法所應度者即為宣說於事於義少略之法若見衆生樂以初發心菩薩法所應度者即為宣說深心發起大悲之法若見衆生樂以久修道行菩薩之法所應度者即為宣說於輪回中無懈倦法若見衆生樂以不退轉菩薩之法所應度者即為宣說嚴淨佛土之法若見衆生樂以一生補處菩薩之法所應度者即為宣說大菩提場莊嚴之法若見衆生樂以佛身所應度者為說菩薩勝行相續不空之法寂慧當知如是等法皆是具足智慧方便諸大菩薩於彼清淨所緣法中而得自在是故廣說不空之法其所說法為令一切衆生歡喜故說說是法時會中有十千人發阿耨多羅三藐三菩提心五千菩薩得無生法忍金剛手菩薩大祕密主授記品第十六之一爾時會中有諸菩薩咸起是念此金剛手菩薩大祕密主其何久近當得成就阿耨多羅三藐三菩提果邪所居佛土當何名字菩薩成佛復名何等眷屬圓滿其數幾何爾時世尊知諸菩薩心所念已即時微笑法爾諸佛現微笑時必有因緣爾時世尊從其面門放種種色廣大光明所謂青黃赤白紅紫碧緑其衆色光普遍照曜無邊世界乃至梵世其光盤旋還來佛所右繞三匝從佛世尊頂門而入爾時寂慧菩薩摩訶薩即於佛前合掌虔恭以妙伽陀而伸請問如金色光妙無垢寂靜月面體凝然破暗最上日光明人仙微笑今何為安處寂定蓮花相大悲震吼進力增念智功德妙香薰善逝蓮花笑何為念如淨器定如油悲炷然燈破三垢妙慧光明息暗冥善逝智光笑何為悲輪光明慧觀察息除三垢滅諸冥淨開智眼利世間佛日妙光笑何為佛知三有世間意遍照一切天人心大仙慈眼視衆生今何大仙現微笑寂慧菩薩說伽陀已爾時世尊即告寂慧菩薩摩訶薩言今此金剛手菩薩大祕密主於此賢劫諸佛如來應供正等正覺所持金剛杵作供養事以利益心守護正法今於我此祕密法中廣大施作普為無量一切衆生成熟最上菩提善根於此賢劫乃至最後樓至如來法中隱沒即於極樂世界阿閦如來佛剎中生而彼世界阿閦如來為彼諸菩薩宣說祕密一百八印時金剛手菩薩大祕密主聞其所說不假加行解入義趣如理如實隨順所行其後復於無量無數諸如來所親近恭敬尊重供養彼彼佛所皆修梵行護持正法廣為無量俱胝那庾多百千衆生成熟阿耨多羅三藐三菩提法而後復過殑伽沙數劫中圓滿菩提分法而乃得成阿耨多羅三藐三菩提果號金剛步如來應供正等正覺出現於世明行足善逝世間解無上士調御丈夫天人師佛世尊世界名普淨劫名清淨寂慧而彼普淨世界金剛步如來剎土之中安隱豐樂嚴淨可觀天人熾盛菩薩廣多七寶具足殊妙莊嚴七寶所謂金銀琉璃硨磲碼瑙珊瑚琥珀及赤珠寶彼世界中周遍盈積可八步量地平如掌柔軟復如迦左鄰尼具諸樂觸建妙幡幢寶繩交絡天妙寶花處處垂下最上精妙衆香氛馥空中自然奏諸音樂無諸惡趣及衆險難如兜率天最勝受用又彼世界隨意所思宮殿舍宇園林樓閣飲食衣服衆莊嚴具皆悉具足隨諸所用皆與天人受用無異受諸天人具大信解深信佛智又彼世界亦復不聞聲聞緣覺二乘名字彼佛所說純一清淨大菩薩法又彼金剛步如來廣多百千菩薩眷屬又彼世界不壞律儀不減壽命不破戒行不失正見亦無顛狂聾啞跛傴謇吃獷惡鬪競缺減諸根等者一切皆具二十八種天人勝相而為莊嚴彼佛如來壽八中劫亦無天人中間夭逝寂慧當知彼金剛步如來其如是等及餘無量勝功德事彼佛世尊隨欲說法即放光明彼諸衆生見是光已即知如來宣說妙法若有衆生互起思念欲詣佛所瞻仰聽法即以彼佛神通智力所加持故尋至佛所或有以自神力至佛所者即時天人大衆咸來集會時彼世尊踊身空中高百千多羅樹時四大洲悉見如來廣大身相又十方世界悉聞震發顯示如來清淨妙音一切衆生聞者適悅又復如來為諸菩薩說正法時無一衆生於其如來宣說之法有所違背彼諸衆生皆悉利根開明知解又彼世界而無王者唯佛世尊金剛步如來最上法王又彼世界一切衆生無我無執復次寂慧又彼金剛步如來於彼剎中諸天人所欲行乞食彼時若天若人即見如來聖像住在其前執持應器彼諸天人見聖像已各欲奉上如來清淨飲食及隨意樂所欲方處座臥之具百味食等皆悉嚴備彼佛知時隨受所施佛受施已即出其舍還復如來所止僧坊諸菩薩衆亦復隨應入三摩地寂慧當知彼佛如來所住世界具如是等及餘無量勝功德事是故名為普淨世界
