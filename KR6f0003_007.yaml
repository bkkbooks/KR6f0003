body:
  text: 復次寂慧如來身相一衆會中有得見者有不見者其得見者歡喜瞻仰其不見者默然懵瞪寂慧當知如來不以段食資養或有衆生見佛亦受世間食者謂有威力具足修菩提行諸賢聖衆常隨佛後於食器中承受其食是乃衆生見佛如來數數舉食置食器中彼諸賢聖既受食已若有衆生於佛法中所應化度宿種善根業障盡者雖復在在所生不得飲食飢渴羸劣以其宿善力故彼等衆生得佛如來殘食而食食已飽滿心得輕安身肢潤益深心清淨即發阿耨多羅三藐三菩提心若諸衆生墮在地獄餓鬼諸惡趣者即不能發大菩提心以是緣故乃至盡涅槃界寂慧是故當知如來不受世間飲食如來資養所謂法食佛身堅固如那羅延天真實故不壞故金剛所成寂慧如來身者非生熟藏之所成養亦非涕洟雜惡不淨所成如來身者如閻浮檀金無缺無斷離諸過失如來身者具大威力體堅重故猶如金剛極柔軟故如迦左鄰那衣隨所觸身皆獲妙樂寂慧當知一時有諸具大威力天子天女禮敬佛足隨禮敬時手觸佛足觸已即發阿耨多羅三藐三菩提心是故當知如來不從雜染所生復次寂慧世間所有貪行衆生暫見如來身已即於自身生離貪想瞋行衆生暫見如來身已即起慈心癡行衆生暫見如來身已即得智光照耀等分行衆生暫見如來身已即於己身離諸煩惱慳吝衆生暫見如來身已即能信解捨法破戒衆生暫見如來身已即能信解戒法清淨忿恚心衆生暫見如來身已即得忍法懈怠衆生暫見如來身已即起精進散亂心衆生暫見如來身已即得寂定愚癡衆生暫見如來身已即得勝慧善男子取要而言若諸衆生暫見如來身者一切善法皆不捨離一切不善疑等染法悉得銷除安立善心然佛如來而常安住無分別捨此説是名如來身密復次寂慧又如如來化所化人作諸佛事而佛如來心無加行亦無發悟復無作意佛亦不作是念我能化彼所化人等然所化衆生可應度者若此世界若他世界乃至阿僧祇百千世界一切衆生為成熟故作諸利益此説是名如來身密復次寂慧如來身放廣大光明具有無數百千種色其光普照十方一切殑伽沙等諸佛剎土廣為成熟一切衆生而佛如來無所發悟亦無加行復無作意此等是名如來身密身業清淨寂慧當知今此皆是少略宣説如來身密身業業清淨若廣説者縱經一劫或過一劫而亦不能得其邊際金剛手菩薩大祕密主説是如來身密不思議法時會中有十千人發阿耨多羅三藐三菩提心八千菩薩獲得忍法爾時會中有諸天人以諸妙花散於佛上及供養金剛手菩薩大祕密主是時世尊舒右金色臂置金剛手菩薩大祕密主頂上作是讚言善哉善哉祕密主汝善宣説如來身密不思議法我悉知之汝所説法我今隨喜如來語密不思議品第八之一復次金剛手菩薩大祕密主告寂慧菩薩摩訶薩言復何名為如來語密語業清淨所謂如來於晝夜中成證阿耨多羅三藐三菩提果於晝夜中入大涅槃然其中間如來未嘗宣説一字亦無詮表何以故以佛如來常在三摩呬多故如來亦無出息入息若尋若伺以無尋伺故所出語言離諸邪妄而佛世尊無尋無伺無所分別無廣分別無説無示復無詮表然諸衆生亦聞如來有所宣説而是如來畢竟在定於一切種及一切時亦以文字而能詮表復無所表若有衆生因以文字生信重者而彼衆生自謂如來為我説法然佛如來心常安住無分別捨復次寂慧如來亦非脣齒舌喉及其面門出諸音聲有所聞聽如來所出音聲從虛空出但以衆生謂佛如來所有音聲從口門出寂慧當知如來語言具有六十四種殊妙之相何等名為六十四種一者流澤二者柔軟三者悅意四者可樂五者清淨六者離垢七者明亮八者甘美九者樂聞十者無劣十一者圓具十二者調順十三者無澀十四者無惡十五者善柔十六者悅耳十七者適身十八者心生勇鋭十九者心喜二十者悅樂二十一者無熱惱二十二者如教令二十三者善了知二十四者分明二十五者善愛二十六者令生歡喜二十七者使他如教令二十八者令他善了知二十九者如理三十者利益三十一者離重復過失三十二者如獅子音聲三十三者如龍音聲三十四者如雲雷吼聲三十五者如龍王聲三十六者如緊那羅妙歌聲三十七者如迦陵頻伽聲三十八者如梵王聲三十九者如共命鳥聲四十者如帝釋美妙聲四十一者如振鼓聲四十二者不高四十三者不下四十四者隨入一切音聲四十五者無缺減四十六者無破壞四十七者無染污四十八者無希取四十九者具足五十者莊嚴五十一者顯示五十二者圓滿一切音聲五十三者諸根適悅五十四者無譏毀五十五者無輕轉五十六者無動搖五十七者隨入一切衆會五十八者諸相具足復次寂慧五十九者如來所出語言普令十方一切世界一切衆生心意歡喜佛亦不作是念我能宣説諸法所謂契經應頌記別諷誦自説緣起本事本生方廣希法論議譬喻又復祕密先行法説本緣法説昔因法近説多説廣説教示安立分位分別解釋開明如來所説如是等法於彼一切大衆會中若苾芻苾芻尼優婆塞優婆夷衆會若天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽等諸衆會佛能各各隨其根性精進分量如其所應為作法施彼等衆會聞説法時皆謂所説從佛如來口門而出然所説法亦無互相語言重復而諸衆會各隨音聲曉了諸法寂慧此即是名如來語密復次寂慧六十者一切衆生其數無量一切衆生行亦無量如來所説衆生心行略有八萬四千種類但為根性下劣衆生令其解入如來所説寂慧當知衆生心行無其分量世間所有貪行衆生瞋行衆生癡行衆生等分行衆生彼彼衆生心行差別若佛如來於一劫中或過一劫乃至如來住世經百千劫隨幾許壽量極壽分限而亦不能説諸衆生心行邊際若佛但説衆生心行無邊際者而諸衆生不能解入返生癡迷是故如來以善方便於諸衆生無量行中略説數有八萬四千又復如來所説諸法隨諸衆生心行差別如其所應皆令開覺寂慧此即是名如來語密復次寂慧六十一者如來語祕密智隨入一切衆生心意然其語言不從如來口門中出但從虛空而出若有衆生謂佛如來所有語言從口門出者彼勿起是見何以故或有衆生見佛語言從烏瑟膩沙相出或從頂出或髮際出或從肩出或從額出或眉間出或毫相中出或從眼出或從耳出或從鼻出或從頰出或口門出或從頸出或從臂出或從手出或從指出或兩脅出或胸前出或背後出或從臍出或陰藏出或從眼出或從膝出或從腨出或從踝出或從足出或從諸相好中出或從一切毛孔中出如是等衆生知解有異寂慧此即是名如來語密復次寂慧六十二者如來所出語言隨諸衆生種種信解隨諸衆生心意成熟普使隨應而得了知然佛如來常住無分別捨譬如世間假法所成諸音樂器隨彼所作而悉妙巧手不觸近非假人力微風吹動出美妙聲其所出聲皆是先業差別風所吹擊如來語言亦復如是隨諸衆生一切意樂智風吹擊亦非如來勤力所出如來隨順一切衆生先業差別衆生境界如應所説寂慧譬如響聲隨有所表其所出聲非內非外亦非中間如來語言亦復如是隨其所出但為表了衆生心意而如來聲非內非外亦非中間又如大海之中有如意珠寶其名圓滿一切意樂懸高幢上自然出聲謂言此珠能滿一切衆生意樂而是珠寶亦無分別如來亦復如是語言妙寶深心清淨懸置大悲幢上隨諸衆生所有意樂如來出妙語言悉令曉了然佛如來常住無分別捨寂慧此即是名如來語密復次寂慧六十三者諸佛如來所有音聲無其分量我不見有世間一切天人魔梵沙門婆羅門等能知如來音聲邊際及分量者何以故我念一時佛在王舍大城鷲峯山中諸菩薩衆而共圍繞宣説音聲輪清淨法門廣為衆生顯明宣示於後一時以慈氏菩薩摩訶薩加持力故尊者大目乾連即作是念如來音聲淨輪分量幾何遠邪作是念已乃於本座隱而不現以自神力即往須彌山頂聽佛如來音聲遠近復運神力遍往三千大千世界又過須彌山西復過四大洲界又過鐵圍山大鐵圍山乃至世界邊際還住鐵圍山頂審聽如來音聲分量是聲平等無所增減爾時世尊知其事已即作是念大目乾連意欲度量我之音聲所有分量我於今時宜攝神力于是世尊攝神通已大目乾連承佛威神所加持故以自通力於此世界西之方分過九十九殑伽沙數佛剎土已往一世界名光明幢彼有如來號光明王現住説法教化衆生是時尊者大目乾連到彼土已審聽世尊釋迦牟尼如來音聲分量譬如十肘地方分中此聞彼人所説音聲大目乾連在彼世界聽佛音聲亦復如是其聲平等無所增減彼光明王如來所有身量高百由旬諸菩薩身高五十由旬是時大目乾連以自神力於彼諸菩薩衆所用鉢中循環而行彼諸菩薩見是相已極生輕笑即白佛言世尊今云何有如沙門相小蟲來此鉢中循行彼佛告言諸善男子汝等不應生輕慢心所以者何今此鉢中行者是彼世尊釋迦牟尼如來上首聲聞弟子於大聲聞衆中神通第一爾時尊者大目乾連前詣光明王如來所頭面禮足右繞七匝住立佛前彼佛告言尊者大目乾連此諸菩薩有所輕笑汝今宜應承彼世尊釋迦牟尼如來應供正等正覺所加持故以自通力現諸神變尊者大目乾連白彼佛言我今如佛教敕加趺而坐於此寶洲作變化事佛言今正是時尊者大目乾連即時勇身空中高七俱胝多羅樹量作變化事於其坐中化現百千俱胝那庾多真珠瓔珞廣大莊嚴而彼瓔珞各出百千俱胝光明一一光明門皆生蓮花是諸蓮花臺中皆有世尊釋迦牟尼如來形像安處其上彼如來像皆悉宣説妙音聲輪清淨正法大目乾連白彼佛言世尊我今加趺而坐於此四大洲一切世界亦能作諸神通變化乃至此小千世界中千世界三千大千世界悉能作諸神通變化彼佛告言今正是時爾時尊者大目乾連如其所應現神變已收攝神力還住佛前時彼諸菩薩衆咸生希有之心前白佛言世尊今此尊者大目乾連其何所為到此世界彼佛告言諸善男子此大目乾連為欲度量彼世尊釋迦牟尼如來聲輪分量故來至此時彼世尊光明王如來告尊者大目乾連言汝自今而往勿復再起是心欲度如來聲輪分量謂以如來清淨音聲無其分量不可度量故假使以汝威勢神力極西方分經于殑伽沙數等劫畢竟不能得彼世尊釋迦牟尼如來音聲妙輪分量邊際以佛如來音聲妙輪無分量故
