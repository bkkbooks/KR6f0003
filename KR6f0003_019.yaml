body:
  text: 復次阿闍世王白佛言世尊菩薩當修幾法獲得自在之法趣向自在佛言大王菩薩當修八法即得自在之法趣向自在何等為八一者出美善語心意質直二者心常柔軟三者心善愛樂四者心常平正五者無諂六者無誑七者不嫉八者心常調暢菩薩若具如是八法即得自在之法趣向自在阿闍世王復白佛言菩薩當修幾法能於自在中住佛言大王菩薩當修四法能於自在中住何等為四一者若生人間願為轉輪聖王值佛出世二者願為帝釋值佛出世三者願為娑婆界主大梵天王值佛出世四者願為豪勝長者值佛出世菩薩若具如是四法能於自在中住阿闍世王白佛言世尊淨信以何為畢竟佛言大王善知識為畢竟王言多聞何為畢竟佛言多聞慧為畢竟王言布施何為畢竟佛言布施大富為畢竟王言持戒何為畢竟佛言持戒能生善趣而為畢竟王言忍辱何為畢竟佛言忍辱隨護衆生而為畢竟王言精進何為畢竟佛言精進善能圓滿一切佛法而為畢竟王言禪定何為畢竟佛言禪定近寂為畢竟王言勝慧何為畢竟佛言勝慧息諸煩惱而為畢竟王言聽法何為畢竟佛言聽法斷諸疑惑而為畢竟王言問法何為畢竟佛言問法離諸雜説而為畢竟王言居處間寂何為畢竟佛言居處間寂得禪定神通而為畢竟王言觀想何為畢竟佛言觀想離念為畢竟王言無常聲何為畢竟佛言無常聲離諸執著而為畢竟王言苦聲何為畢竟佛言苦聲無取為畢竟王言無我聲何為畢竟佛言無我聲滅我我所而為畢竟王言寂靜聲何為畢竟佛言寂靜聲隨止為畢竟王言深固作意何為畢竟佛言深固作意發起正見而為畢竟王言若身心離何為畢竟佛言身心離發起禪定神通而為畢竟王言聖道何為畢竟佛言聖道現前三昧果而為畢竟王言信解何為畢竟佛言信解解脫圓滿而為畢竟王言諸佛出世何為畢竟佛言諸佛出世成就一切菩提分法而為畢竟王言如何是佛出世佛言大王隨發菩提心即是佛出世王言云何發菩提心佛言所謂大悲出生王言云何大悲出生佛言謂即發起淨信王言云何發起淨信佛言若發菩提心即是發淨信王言當云何發彼菩提心佛言深心不退轉是發菩提心王言云何是深心不退轉佛言即是所起大悲王言云何能發大悲佛言於一切衆生不生厭捨之心即是大悲王言云何於衆生得不厭捨佛言所謂不著己樂王言云何是不著己樂佛言謂於三寶常不捨離王言云何能於三寶不捨離邪佛言若能除去一切煩惱即於三寶而不捨離爾時阿闍世王重復肅恭前白佛言希有世尊希有善逝善説如來清淨法律如來能善施設學處復能隨順諸佛世尊所説正法不壞因果遠離斷常隨諸所説成辦事業善惡果報俱無壞失離諸虛誑如佛所説如是最上廣大清淨教中誰人敢破復誰問難及生毀謗唯除不種善根諸罪業者世尊我昔不曾深種善根於佛勤孝不能出自血肉報佛深恩願佛今時威力加護令我一切煩惱一切罪業皆悉消滅世尊彼妙吉祥童真菩薩是善知識長夜利樂為我息除諸有惡作法光照我我亦不能報彼深恩世尊大慈大善知識能為我説普盡梵行最上正法賢王天子品第二十三爾時寂慧菩薩摩訶薩前白金剛手菩薩大祕密主言如佛世尊化所化事汝祕密主可能隨作諸化事邪金剛手菩薩言今佛現前為我作證所有殑伽沙數等諸佛如來諸有化事而我亦能隨佛施作所謂種種色相遊戲神通但以宿世深心清淨而為畢竟爾時寂慧菩薩復白金剛手菩薩大祕密主言我今勸請大祕密主願以神力加持護念令此正法於後時後分後五百歲廣宣流布使彼正法所攝諸大士等得此正法墮於手中金剛手菩薩言善男子諸佛如來於此正法已共加持何以故今此正法即是文字所成而彼文字無生無盡亦不隱沒以其文字及所説義不能隱故如來此説甚深正法亦不能隱所以者何無法可生若法無生即法無滅如是當知如佛所言若佛出世若不出世諸法常住所謂法性法界法住實際清淨法如是故如其所説諸法緣生亦不相違若法緣生不相違故即是正法以正法故即不隱沒如是所説乃名正法寂慧菩薩言祕密主云何能被精進鎧攝護正法金剛手菩薩言若於一切法不相違即能被精進鎧攝護正法何以故而此正法與一切法不相違故寂慧菩薩言何法是相違金剛手菩薩言文字相違故即法相違而不復與生法相違若彼不相違是為攝護正法者寂慧菩薩言彼攝護正法有與一切世間相違不金剛手菩薩言有善男子何以故世間衆生取著諸見有執空語者彼即世間相違又謂世間是常樂我淨而世間者是無常是苦無我不淨彼即世間相違又世間衆生順生死流逆正法流彼即世間相違又世間衆生尊現世法護正法者尊他世法彼即世間相違又世間衆生取蘊處界護正法者説一切法無取著故彼即世間相違寂慧當知以是緣故護正法者與彼世間相違寂慧菩薩言大祕密主汝當云何攝護正法金剛手菩薩言如我攝護者謂無我無衆生無法而乃攝護寂慧菩薩言此復云何金剛手菩薩言謂我離故衆生離故法離故我衆生法不離故過去離故未來離故現在離故過去未來現在不離故三世離故三世不離故諸佛離故諸佛不離故剎土離故剎土不離故法離故法不離故若能通達如是法者即能攝護正法爾時世尊讚金剛手菩薩大祕密主言善哉善哉大士汝善攝護正法若於一切法無執無取即能攝護正法若於一切法有相戲論無取無集乃至一切分別遍計悉無分別即能攝護正法爾時會中有一天子名曰賢王前白佛言世尊近止近寂是佛所説若如所説者即一切所緣皆悉寂止而無所觀以彼近寂不復和合發生諸法雖法寂靜遍寂近寂而復任持如來正法亦不棄捨雖復任持然於一切法無所任持亦無棄捨當彼天子説是法時會中有千苾芻得心解脫有千天子得法眼淨爾時寂慧菩薩白賢王天子言云何得是辨才天子答言能斷一切習氣離語言道無所記説勝義諦中無法可取故得辨才寂慧菩薩言天子辨才云何出生天子言無辨才故離辨才故所以者何無辨才者此説即是無和合義離辨才者此説即是離戲論義復次善男子如所説故何有辨才可得若為他表了識即不轉若自表了識亦無住以如是故乃得辨才若於諸所緣以意表了者又無障礙法性之中而無所住故得辨才又一切法中智無所轉無有少法智可知解故得辨才又無住法中無出無入越諸染法故得辨才又一切法無生而生無滅而滅故得辨才爾時寂慧菩薩白佛言希有世尊此賢王天子具大辨才佛言寂慧此賢王天子從極樂世界阿閦佛剎中而來至此欲聽金剛手菩薩大祕密主宣説如來祕密正法又此天子已得隨入一切法相陀羅尼故於百劫中無所願求自然獲得無礙辨才隨所宣説辨才無礙總持功德讚説譬喻無盡品第二十四之一爾時寂慧菩薩白佛言世尊云何名為隨入一切法相陀羅尼佛言寂慧隨入法相者即是文字無盡隨入之智謂阿字門隨入一切法故又阿字者是即諸法出生之門又阿字者是即諸法初生後際又阿字者於一切處成辦事業隨起語業無所了知非無了知以阿字門隨入一切法故此説是名隨入法相陀羅尼門復次寂慧所言隨入者於一切處無有少法如微塵許可出可入無文字故從何所來復從何入中亦何住以其文字中無住故而即無出何方而去又以文字無和合故即無文字而可記説亦非無説無增無減以無文字故無有是法亦無非法而可分別以無文字故無法可生無法可滅無法可成無法可壞寂慧當知如是文字算數即是心之算數如心算數即是一切法算數如一切法算數即非算數何以故法無算數可得故以無算數法可算數故即一切法算數不可得如是即能隨入法相本來如是隨入無生若入無生亦復無起此即無有少法可入是故諸法無入而入寂慧若能如是入諸算數即於辨才而不能斷何以故法性無斷故若如是通達即能隨應為他説法隨有所説現前作證由如是隨入諸法相故即是隨入衆生相以其隨入衆生相故即如所信解善説諸法寂慧得陀羅尼菩薩其心離垢意樂清淨正行潔白其心高勝所行善住妙慧最上而獲神通堅固圓滿不為魔軍之所破壞降伏外道制諸煩惱解除怨結身有力勢心無疲倦辨才無盡演法無邊善説無際勝智無礙具深妙慧善説深法多聞如海住三摩地如須彌山所有衆會如師子王世法清淨如彼蓮花長養衆生如其大地息煩惱愛猶如大水成熟衆生猶如大火於一切衆生起平等心猶如妙月破煩惱癡暗猶如大日除煩惱怨如勇力者心善調伏猶如大龍高振法音如大雲吼普施法雨如澍大雨療治衆生諸煩惱病如大醫王作大法王如王自在善護世法如護世天善觀天人如帝釋天主心得自在具增上力猶如梵王無所繫著猶如飛鳥怖諸憒閙猶如猴鹿於一切衆生忍伏諸惡猶如慈母教授藝能開諸學門猶如慈父施諸法寶流注無盡如毗沙門天王得福莊嚴具諸相好人所樂觀見者歡喜具七珍財無貧乏苦攝諸無智稱讚智者具智慧故離諸過失善護諸天善護諸龍及夜叉等説法自在神通無礙了知一切衆生意樂隨入一切衆生根性聽法無厭不求一切名聞利養説法無吝無染著故具戒清淨無怨害故忍力清淨善能成辦諸事業故精進清淨得自在故禪定清淨潔白智故勝慧清淨梵行最上故具四無量善修出世靜慮等持成就無上菩提聖道以具如是諸相功德故當得無上法王灌頂寂慧當知得陀羅尼菩薩尚獲如是無量功德若復如來神力加持諸有事業皆得陀羅尼菩薩功德經百千歲稱讚譬喻而不能盡爾時寂慧菩薩白賢王天子言仁者汝今快得善利能善稱讚如來無量無邊功德時賢王天子白寂慧菩薩言善男子勝義諦中無有少法可得稱讚何以故法無有相非形顯色是故功德不能稱讚得其邊際若形顯色中決定有相者即可以言詞宣説稱讚
