body:
  text: 復次大祕密主如來於一切法中總略而說有四法印何等為四一者諸行無常為諸沙門婆羅門及長壽天執常語者破常想故二者諸行是苦為諸天人計樂想者破樂想故三者諸法無我為彼執我諸外道等破其我想四者涅槃寂靜為諸增上慢者起尋求行破彼增上慢故此言無常者即是畢竟無有常法增語此言苦者即是遠離願求增語此言無我者即是空相增語涅槃寂靜者即是無相作證增語大祕密主此如是法若諸菩薩深固信解勤行修習即於善法而不減失速能圓滿菩提分法爾時護世四大天王前白佛言世尊我等四王皆名護世當以何法而能護世佛告四大天王言汝諸仁者當修正法行即能護世其正法行者所謂十善何等為十一者不殺二者於自富樂而生喜足無其分量三者於他妻室不起染污四者不破他眾五者不出惡言六者所言如實七者言無綺飾八者於他富樂無所希望九者止息瞋恚十者正見清淨諸仁者此十善法乃能護世復有八法而能護世何等為八一者如說能行二者於一切處尊重師長三者順行正道四者心意質直五者心常柔軟六者於一切眾生常起慈心七者不作諸罪八者集諸善根如是八法乃能護世復有六法而能護世何等為六一者行慈身業於師尊所及善知識同梵行者乃至一切眾生悉起尊重愛樂意念是為第一身業和敬二者行慈語業於師尊所及善知識同梵行者乃至一切眾生悉起尊重愛樂意念是為第二語業和敬三者行慈意業於師尊所及善知識同梵行者乃至一切眾生悉起尊重愛樂意念是為第三意業和敬四者依法所得一切利養少略乃至鉢中之食與彼知識同梵行者周普均平等同受用又復尊重愛樂意念是為第四利養和敬五者於戒修法無斷無缺圓具無濁所應受者不生貪取智所稱讚離諸譏毀以如是等淨戒之法與善知識同梵行者共所修持又復尊重愛樂意念是為第五戒修和敬六者於諸正見出離法中及勝決擇分隨何等法修其正行即當如應與善知識同梵行者共所修作又復尊重愛樂意念是為第六同見和敬諸仁者此六和法乃能護世復有四法而能護世何等為四一者不貪以不貪故不墮惡趣二者不瞋以不瞋故不墮惡趣三者不癡以不癡故不墮惡趣四者不怖以不怖故不墮惡趣諸仁者如是四法乃能護世復有二法而能護世何等為二一者有慚二者有愧具是二法即能護世復有一法而能護世何等為一謂真實行以真實故即能護世又復善語又無諂曲此等一法皆能護世諸仁者如是等法汝等勤行即能護世自能護已復令他人亦能護世去來品第二十爾時世尊即作是念我今宜應為此眾會宣說祕密大明章句令其眾會善根相應大菩提法久住世間作是念已即告金剛手菩薩大祕密主言我昔曾於阿波邏羅龍王宮中及大菩提場初成道時以利益心攝受世間我時宣說大明章句汝能記念耶金剛手菩薩白佛言世尊我能記念佛言祕密主汝今說彼大明章句是時金剛手菩薩大祕密主從座而起前詣佛所胡跪合掌頂禮佛足即說祕密大明章句曰怛𭔞他引句賀虎羅引二虎羅嚩帝引三虎賀囉拏引四薩吳引拏引五左左左左左引六儞布拏引七芻怛剎多引八剎野剎夜引九多引剎野薩摩引十設末儞葛囉引十一賀盧十二賀盧嚩帝十三尸羅嚩帝十四緊阿引尾設野帝十五儞薩囉尼引十六惹惹十七惹惹末帝十八阿嚩吒引十九儞嚩吒引二十嚩栗多二合引奴娑引哩尼引二十一部引多引奴塞蜜哩三合帝二十二呼引禰嚩多引奴塞蜜哩三合帝二十三呼引那引誐引喃引二十四藥叉引𧹞引二十五巘馱哩嚩二合引𧹞引二十六摩呼引囉誐引𧹞引二十七莎悉底二合哩婆二合嚩都引薩哩嚩二合薩埵引喃引二十八尾計囕都引摩訶引鉢哩嚩二合多引二十九三咩他旦引馱囉尼引三十誐哩惹二合引都引三母捺囉二合尾誐壹帝三十一金剛手菩薩大祕密主說是祕密章句時一切魔宮皆悉振動大地傾搖大海騰涌一切眾會皆悉戰怖咸詣佛所頂禮求救是時世尊復以一足按地大千世界皆悉動搖時諸眾會俱向佛所作是白言救我世尊救我善逝我等一切驚怖戰悼佛言勿怖勿怖此是諸佛大明章句威神境界能使大地振動大海騰涌日住虛空亦復動搖爾時世尊即為金剛手菩薩及諸眾會如其所應略說法要是時會中有八萬人發大菩提心有無量人住有學地爾時金剛手菩薩大祕密主長子金剛軍持妙寶網覆於佛上前白佛言世尊菩薩云何能於阿耨多羅三藐三菩提得不退轉佛言善男子菩薩若能具修十法即於阿耨多羅三藐三菩提得不退轉何等為十一者常行無礙大慈二者常起無倦大悲三者精進辦諸事業四者善修空三摩地五者現前通達勝慧六者於一切處皆善通達七者能以妙智清淨三世八者以無礙方便觀實業報九者雖了知空而植眾德本十者如其所說自性清淨而善入聖道菩薩若具如是十法即於阿耨多羅三藐三菩提得不退轉時金剛軍復白佛言世尊菩薩當修何法於佛不思議門聞已安然不生驚怖佛言善男子菩薩當修八法即能於佛不思議門聞已安然不生驚怖何等為八一者增長勝慧二者增長妙智三者常為善友之所攝受四者具大信解五者善達如幻無生之法六者信解無常之法七者心行平等猶如虛空八者於諸法中善知障礙所起之相菩薩若具如是八法即能於佛不思議門聞已安然不生驚怖金剛軍復白佛言菩薩當修何法即能於諸所作而得自在佛言善男子菩薩當修四法即能於諸所作而得自在何等為四一者善修現前無滅之法具五神通二者善觀勝解脫門具四禪定三者超勝梵世具四梵行四者以方便慧於一切處善修無生菩薩若具如是四法即能於諸所作而得自在金剛軍復白佛言菩薩有幾種法門佛言善男子菩薩有四種法門何等為四一者智門善入一切眾生根性二者慧門能善分別宣說句義三者陀羅尼門善入一切言音總持四者無礙解門能善宣說諸無盡法此為菩薩四種法門金剛軍復白佛言菩薩有幾種力佛言善男子菩薩有九種力何等為九一者定力大悲起故二者精進力不退轉故三者多聞力勝慧生故四者信解力圓滿解脫故五者修習力離散亂故六者忍力善護眾生故七者菩提心力降伏諸魔故八者大悲力成熟眾生故九者無生忍力圓滿十力故如是名為菩薩九力當佛世尊說是法時彼長子金剛軍得無生法忍證是忍已復白佛言惟願世尊威神建立令此正法於金剛手菩薩大祕密主宮中而得久住使彼具法器眾生獲得聞慧光明照觸乃至如來般涅槃後於閻浮提中廣令流布使不隱沒爾時世尊受金剛軍勸請已即告金剛手菩薩大祕密主言祕密主汝今宜應宣說我於大菩提場初成道時護諸菩薩降伏攝受諸魔軍眾所有祕密大明章句建立加護令正法眼久住世間攝伏諸魔邪異外法爾時金剛手菩薩大祕密主承佛教勅從座而起偏袒右肩右膝著地合掌恭敬頂禮世尊說大明曰怛𭔞佗引一句虎盧二虎羅引三虎梨四提引哩五訶引哩引底六阿酤引設羅剎曳七左梨八左羅嚩帝九娑引哩十芻哩十一羼引帝末利十二翅彌十三羼引帝葛哩十四剎彌十五設彌十六扇引帝葛哩十七虎呼引十八阿梨十九詰詰哩二十珂哩二十一阿引尾設儞二十二囉娑二十三囉娑儞二十四惹曳二十五惹野嚩帝二十六體哩二合二十七阿引嚩哩帝二合二十八尾嚩哩帝二合二十九阿嚩哩多二合儞三十梅引底哩二合引部引多引喃引僧誐囉二合呼引三十一捺彌三十二捺摩三鉢儞三十三帝引蘭拏二合多引囉曳引三十四部引莎焰莎悉帝二合禰尾毘踰二合引三十五那引倪毘踰二合引三十六藥翅毘踰二合引三十七巘馱哩尾二合毘踰二合引三十八藥叉西毘踰二合引三十九摩奴賒引摩奴試毘藥二合四十莎悉底二合哩婆二合嚩都引薩捺引蘇欠四十一說是大明時一切山王皆悉振動大地傾搖大海騰涌所有一切邪異外法皆悉攝伏歸正法語善護一切正法寶藏一切天眾互相慶悅說伽陀曰祕密大明宣說已能令正法久住世三千世界悉傾搖求人中尊願救護大師善說真實語普為眾會施無畏威神建立此法門能令正法久住世爾時世尊於金剛手菩薩宮中住經七日廣為無量一切眾生作利益已乃至曠野大城一切情品廣大周遍無不蒙益即離本宮還處空中菩薩聲聞人天大眾恭敬圍遶復有無數百千夜叉羅剎阿修羅迦樓羅等前後導從梵王帝釋護世天等布光明網奏妙音樂雨眾異花時諸剎土皆悉振動以佛威德神通勢力加持神變及威儀事譬如鵝王遊戲自在漸吹還詣鷲峯山中金剛手菩薩大祕密主以佛威神而隨佛後
