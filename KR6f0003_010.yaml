body:
  text: 譯經三藏朝散大夫試光祿卿光梵大師賜紫沙門臣惟淨等奉詔譯菩薩詣菩提場品第十二爾時菩薩既澡沐已復受飲食身力充實即時往詣大菩提場到已告語善地天子并諸地居天子衆等說伽陀曰任持大地不動搖菩薩離愛斷害者今此樹下證菩提汝等莊嚴於此地善哉地居天歡喜普遍清淨三千界廣散最上妙香花遍灑香水皆清淨所有堅手及持鬘常憍天等至空居歡喜瞻仰菩薩尊散衆妙花伸供養四護世天并衆會乃至一切四大洲遍三千界金網嚴覆以供養人中勝三千界中帝釋主供養菩薩大威德如廣勝殿天妙嚴三千界嚴亦如是夜摩天衆咸欣悅覆琉璃網以嚴治廣三千界寶珍奇為人中仙伸供養兜率天衆咸欣悅布真珠網作嚴飾珠瓔其猶半月形復散真珠廣如雨化樂天王并天衆閻浮檀金為寶網金網寶鐸出妙聲遍三千界聞皆喜諸有天中淨妙寶無邊照曜淨光明他化自在天所嚴供養一切義無畏所有龍及乾闥婆摩睺羅伽修羅等各於自宮廣莊嚴及以妙嚴於欲界復次寂慧是時大梵天王見是菩薩詣菩提場殊勝相已即告一切梵衆天子言汝諸仁者知是事不今此菩薩摩訶薩於大誓願廣大甲胄而不棄捨復於堅固甲胄無懈退意能善成辦諸菩薩行修諸波羅蜜多善住彼岸於一切菩薩地中善得自在一切菩薩意樂悉能清淨復善通達一切衆生種種根性深入一切如來祕密分位諸魔業道已悉超越於一切善根得不壞信諸佛威神共所建立普示一切衆生正解脫道為大導師摧破一切魔外境界三千大千界中一勇猛尊積集法藥為大醫王覆以解脫繒帛為大法王放大慧光建大法幢世間八法皆不能染真實清淨大蓮花生於一切法總持無忘大海出生離諸增損不動不搖如須彌山妙善無垢妙善清淨自淨妙慧大摩尼寶之所出生一切法中而得無礙大梵所生心業調暢具如是等功德菩薩今詣大菩提場欲證阿耨多羅三藐三菩提果降諸魔軍為令圓滿如來十力四無所畏十八不共佛法普為一切轉大法輪作獅子吼於諸衆生廣行法施令諸衆生法眼清淨以其正法攝伏一切邪異外論為欲圓滿往昔誓願為欲親近諸佛世尊於諸法中得富饒自在汝諸仁者當發勤勇之心於菩薩所親近供養時大梵天王以清淨心復告一切梵衆天子言諸仁者今此菩薩於多百千劫中精修禁戒是即最上清淨大士今詣大菩提場將成正覺汝等宜應於一切三千大千世界廣作殊妙莊嚴等事爾時大梵天王說伽陀曰清淨大士戒決定廣為人天作利益人中天供天中天詣菩提場大寂默降伏一切魔軍衆一切智智真覺了一切佛法悉圓明轉正法輪行利樂大智一振獅子吼一切衆生聞皆喜令開法眼清淨因人中尊詣菩提樹邪異外論皆攝伏往昔誓願悉周圓正覺事業現令成人中尊詣菩提樹善哉和合皆專志普遍地方作莊嚴三千大千世界中普見莊嚴於欲界如其欲界所嚴事色界莊嚴亦復然善哉梵衆清淨心廣作莊嚴三千界欲界所現供養事上界亦現諸供養遍散最上妙香花寶嚴衆樂皆吹擊三千世界諸天衆見聞欣躍伸敬禮乃至色究竟天中各各自宮廣嚴飾上中復上勝中勝普現莊嚴衆天宮天女六十百俱胝建菩提場金剛座一切遍灑於香水復散種種殊妙花遍列衆寶此地方大菩提場廣嚴好語不能讚諸功德此有無量種莊嚴大士決定戒精修世間善利大威德將詣菩提樹王下降伏魔軍諸惡慧一切和合聖者行廣作三千界嚴飾天人中尊法自在供養彼得無邊福梵衆聞彼人中尊殊妙莊嚴三千界妙花寶幢作嚴事變化世界寶所成俱胝妙蓋化空中如日月光極嚴麗娑羅樹花衆最上化現悉如歡喜園大仙循道歡喜行變化莊嚴七車量寶成金蓮華密覆七重界道而圍繞帝釋天主作莊嚴人天希有昔未見如忉利天廣勝殿四大洲嚴亦復然夜摩兜率化樂天他化嚴同色究竟勇發勤力皆迅疾共嚴最上菩提場如欲界中勝莊嚴天龍等衆亦如是於剎那間皆化現菩薩於中所行詣四方天女數俱胝詣菩提樹衆圍繞塗香末香衆妙花一切處灑妙香水大菩提樹本妙嚴如忉利天園生樹所有一切莊嚴事語不能讚諸功德那庾多數彼諸天彼彼莊嚴皆殊妙復次寂慧菩薩既至菩提場已始下雙足千輻輪相按彼地時即有廣大光明出現是光普照一切地獄傍生餓鬼趣中諸衆生類蒙光照觸所受諸苦暫得停息迦梨迦龍王宮中大光普照爾時迦梨迦龍王見是菩薩光明照已心生歡喜踴躍慶快即時為彼自宮眷屬及諸龍衆說伽陀曰如金色光極晃曜大明照我龍王宮我蒙光照適其身亦復心生大歡喜如我於彼先佛所昔曾見此瑞光明而今所覩定無疑佛大無畏當出世汝等各持妙香花塗香末香花鬘等真金及彼摩尼珠以為瓔珞并上服復持種種妙樂具珠寶所嚴衆幡蓋及寶所成妙高幢為天人師伸供養所有龍王妙宮殿廣大莊嚴悉清淨汝等應生歡喜心皆同親詣於佛所爾時迦梨迦龍王與自宮人眷屬并諸龍衆各持種種上妙香花衣服幢蓋及衆樂具鼓吹歌音上踴空中香水如雲遍灑一切復雨龍華龍真珠等如是廣以龍王威神龍王通力現諸化事詣菩薩所到已即時與諸眷屬禮菩薩足鼓妙音樂虔伸供養作供養已是時龍王右繞而住說妙伽陀伸讚歎曰人中尊放大光明普照一切佛剎土剎那惡趣苦皆停我等龍宮俱照曜龍衆蒙光照觸已咸生歡喜作是言菩薩成佛定無疑金色光明乃如是有那庾多龍女衆恭敬捧持妙香花及勝衣服衆幡幢詣菩薩所伸供養今此地方花蓋等一切殊妙廣莊嚴又復藥草諸樹林低垂悉向菩提樹江河停流而寂靜風止搖擊悉安然菩薩今日證菩提世間最勝降魔者梵王帝釋諸光明日月光等悉映蔽蒙光照者得清涼佛出世故咸歡喜復有諸妙吉祥瓶右旋宛轉在空中仙衆龍衆等居空右旋其狀亦如是世間若天若人等各各至誠伸供養菩薩今日證菩提為求慧者開正道我等今日於佛所增益威光得善利我昔供養拘留孫及迦諾迦大聖主迦葉最上人中勝乃至今供釋迦仙此求菩提大神通最勝希有昔未見具德最上人中尊出大梵音獅子吼堅求菩提決定心是心超勝無比等而彼日月可墮落須彌山王可破壞今日不圓十力尊世間無復有是處復次寂慧時迦梨迦龍王上首之妃名曰金光與諸龍女恭敬圍繞持以種種殊妙寶蓋種種妙衣及天花鬘種種巧嚴真珠瓔珞種種上妙摩尼珠寶及彼種種衆妙香瓶奏妙歌音詣菩薩所到已禮敬散諸寶花而伸供養住菩薩前說伽陀曰心無動亂無恐畏無貪無瞋亦無癡能調難調無染尊能離諸惡無所著我今頂禮淨解脫大仙拔除諸疑箭以大智光破無明能度世間諸苦惱世間無依無救者菩薩善為作依救光明普照三界中天人歡喜心清淨空中遍雨衆妙華及散妙衣廣嚴飾如是勝相我所知今日大仙成正覺勝者勇詣菩提樹降伏諸魔無染尊煩惱黑暗網蠲除證大菩提心寂靜汝經多俱胝劫中於先佛所求菩提難行能行為世間今時圓滿勝意樂復次寂慧爾時菩薩將成正覺有諸賢聖以威神力而為警發即時有一刈草之人名曰吉祥自然住立菩薩之右持以淨草是草柔軟如孔雀項復如迦左鄰那衣色香具足一一右旋時刈草人即持其草詣菩薩前奉上菩薩深發最勝阿耨多羅三藐三菩提心復次寂慧彼時吉祥刈草人者以宿願深固昔發願言願我悉於賢劫之中諸菩薩衆成正覺所大菩提場皆布淨草何以故寂慧我念過去於此賢劫之前九十一劫中有佛出世號毗婆尸如來應供正等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊彼佛法中圓滿一千大菩薩衆修持梵行時彼世尊為賢劫中諸大菩薩授阿耨多羅三藐三菩提記是時有一長者名曰具慧在大會中聞彼世尊授諸菩薩菩提記已即發阿耨多羅三藐三菩提心時彼長者發是願言願我於此賢劫諸佛如來菩提場中悉布勝妙師子之座或施淨草寂慧當知無復疑念彼時具慧長者豈異人乎即是釋迦菩薩成正覺時奉淨草者吉祥刈草之人以是緣故汝今應知彼吉祥刈草之人隨宿願力於諸佛所或施淨草或布妙好師子之座隨諸衆生信解智力善根成熟其事如是復次寂慧是時菩薩既至菩提樹已彼菩提樹神及十千天女皆悉捧持諸上妙花及塗香等詣菩薩前各以所持諸妙香花用散供養各各頭面禮菩薩足異口同音說伽陀曰歸命威德大無畏善寂善調破諸惡離過勇猛大威光清淨導師無染者能救無依諸苦惱唯一聖尊施諸樂世間煩惱病能除為大醫王普救療歸命清淨大名稱天歡喜散花如雨決定今速證菩提起大慈心攝一切往詣樹王登勝座摧破一切諸魔暗覺悟寂靜證菩提亦如先佛所證悟俱胝劫修清淨行難作能作利世間大仙意樂今已圓安坐樹王成正覺復次寂慧是時菩薩持以淨草詣菩提場到已即於金剛座上自布其草然後乃向菩提樹王恭敬頂禮右繞七匝菩薩布草之後是時即有八萬四千天子持以八萬四千妙好莊嚴師子之座奉上菩薩其座高廣嚴好殊麗衆寶莊飾覆以寶網及真珠網復垂珠瓔而為交絡妙巧施設無數百千上妙衣服菩薩爾時即現其身各各安處八萬四千師子座上彼諸天子互不相見皆謂菩薩在我所施師子座中菩薩坐已成證阿耨多羅三藐三菩提果是諸天子咸生歡喜清淨之心皆悉不退轉於阿耨多羅三藐三菩提
