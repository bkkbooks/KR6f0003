body:
  text: 爾時世尊即詣波羅奈國仙人墮處鹿野苑中到已現身各各處于衆師子座是時梵王帝釋諸大菩薩一一各見如來在我所施座中處于座上轉大法輪是彼諸衆咸生清淨歡喜之心皆悉不退轉於阿耨多羅三藐三菩提是時世尊安處最上師子座已即時十方無邊世界皆悉震動有大光明普遍照曜爾時世尊即入無邊境界三摩地入是三摩地已時此三千大千世界普遍大地坦平如掌又此三千大千世界所有衆生若地獄餓鬼畜生人天諸趣一切衆類皆得安樂無一衆生為貪瞋癡并諸煩惱所嬈害者互起慈心如父母想復次世尊入是無邊境界三摩地時即有十方無量阿僧祇菩薩咸來集會聽受正法是時乃至三千大千世界所有一切具威力者天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等咸來佛會聽受正法寂慧當知世尊欲説法時而此三千大千世界普遍地方一切人天廣大之衆皆來集會周匝充滿一毛端量中無空隙皆為聽受世尊宣説正法爾時世尊知彼一切人天大衆皆集會已即從三摩地安詳而起發大悲心乃以如來清淨慈眼普遍觀察一切衆會轉正法輪若沙門若婆羅門并餘一切皆同一法復次寂慧如來所轉法輪皆為一切衆生令其心意歡喜故轉復令衆會一切衆生各各了知佛所説法隨佛世尊欲轉法輪先有十方無量阿僧祇菩薩咸來集會聽受正法即時復有百千俱胝那庾多欲界天子色界天子亦來集會聽受正法爾時世尊作是説言諸仁者眼非常法何以故若以苦言應得度者即聞所説此眼是苦若以無我言應得度者即聞所説此眼無我若以空言應得度者即聞所説此眼是空若以寂靜言應得度者即聞所説此眼寂靜若以離言應得度者即聞所説此眼法離若以無常言應得度者即聞所説此眼無常若以無依止言應得度者即聞所説眼無依止若以如幻言應得度者即聞所説此眼如幻若以如夢言應得度者即聞所説此眼如夢若以如水月言應得度者即聞所説眼如水月若以如影像言應得度者即聞所説眼如影像若以如對響言應得度者即聞所説眼如對響若以空無相無願無作無生無起等言應得度者即聞所説此眼是空無相無願無作無生無起若以緣生言應得度者即聞所説此眼緣生説眼既然耳鼻舌身意亦復如是乃至若以緣生之言應得度者即聞所説意是緣生色聲香味觸法其義亦然或聞空言或聞五蘊無常之言或聞十八界無常之言或聞十二處無常之言或聞苦言或聞集言或聞滅言或聞道言或聞四念處言或聞四正斷言或聞四神足言或聞五根言或聞五力言或聞七覺支言或聞八正道言或聞奢摩他言或聞毗鉢舍那言或聞緣生法言或聞聲聞相應法言或聞緣覺相應法言或聞大乘法言復次寂慧如來所轉法輪皆為一切衆生令其心意歡喜故轉又復如來所轉法輪廣為一切衆生作大利益假使有人與舍利子智慧等者意欲籌量解入斯法縱經百劫終不能入何況餘者寂慧當知如來從初作行詣菩提場降伏魔軍以勝莊嚴震師子吼遊戲神通轉大法輪作如是等勝利益時有八萬四千人發阿耨多羅三藐三菩提心無量衆生於三乘中而得成熟所緣品第十五之一爾時金剛手菩薩大祕密主白佛言世尊如佛世尊所説法時豈非我於如來所説有違背耶或隨順耶如來所説甚深廣大如來所説甚深祕密一切世間難信難解罔徹源底世尊諸如來心真實決定我於如來所説深法或有知解皆是如來勝智在我身中此非我有士夫力用佛言祕密主如是如是如汝所説所以者何汝今當知所有如來安立譬喻演説諸法而彼一切衆生皆有如來勝智在於身中何以故祕密主而諸衆生遍一切處隨其如來所説祕密若不容受如來加持之力而能隨順如來法性者無有是處又復於彼如來所説祕密深法若聞若説若有知解皆是如來加持力故復次祕密主如來正語有所説時應知如來法性如實法性真常又復如來所行如實所行真常是故如來以正語言説是正法又祕密主所有過去未來現在諸佛世尊以一切世間難信難解阿耨多羅三藐三菩提如是正法宣説引導廣為開示而彼衆生若於如是難信難解甚深正法聞已即能生信解者當知彼等衆生非於一佛十佛親近承事當知已於廣多俱胝那庾多百千佛所親近承事應知彼人是為正士精修福行又祕密主假使須彌山王或摧墜時尚能有人或以頂肩而為荷負若彼不種善根衆生能於如是甚深正法一念生起淨信解者無有是處何況受持讀誦如説修行又祕密主若有衆生能於大乘正法之中聞已信解者當知是人非於一佛親近承事已於廣多佛所親近承事大乘法中廣修勝行植善根種爾時寂慧菩薩摩訶薩前白佛言世尊如佛世尊説近止法此以何義而名近止此近止者何所從來佛言善男子所説近止者即是近止煩惱增語此近止煩惱即是近止思惟分別遍計增語此近止思惟分別遍計即是近止想作意增語此近止想作意即是近止顛倒增語此近止顛倒即是近止因所緣增語此近止因所緣即是近止無明有愛增語此近止無明有愛即是近止我我所增語此近止我我所即是近止名色增語此近止名色即是近止斷常見增語此近止斷常見即是近止有身見增語寂慧當知若與所緣因見相應即諸煩惱而亦隨轉一切皆從有身見起若能近止有身見者即諸見止息若有身見近止即一切願求亦止若有身見近止即諸煩惱亦止寂慧譬如大樹若斷其根即枝葉莖幹而悉枯悴此有身見亦復如是若近止已諸煩惱亦止寂慧當知一切衆生始以不能覺了有身見故即諸取煩惱隨逐而生若能覺了有身見者即諸取煩惱不復隨生亦無所害寂慧菩薩白佛言世尊彼有身見何能覺了佛言寂慧若我人衆生壽者等見而不起者即能覺了彼有身見復次寂慧彼有身見不住於內不住於外於一切處而悉不住以不住故見無所住寂慧此無住智如實覺了彼有身見又復寂慧當知有身見即是空增語若能隨順空智忍者即見無所取此即是為如實覺了彼有身見又有身見者即是無相無願無作無生無起等見是見無所取此即是為如實覺了彼有身見復次寂慧當知有身見者即是無身非開非合一切皆是不實分別以其不實所分別故彼即無分別亦不離分別由無分別不離分別故即無所作無障無起以無起故即無所行由無所行故如是此説乃名近止寂慧菩薩言何名近寂佛言寂慧有所緣心如火熾然若無所緣及無所作即不熾然不熾然法此名近寂又如大火有薪即然無薪即滅所緣心火炎熾亦然若無所緣心火自滅寂慧當知具善巧方便菩薩於般若波羅蜜多清淨所緣法中平等了知善根所緣勝法而不息滅煩惱所緣染法制令不起波羅蜜多勝法常令增進魔業煩惱所緣染法永令斷滅菩提分法清淨所緣不應棄捨聲聞緣覺意樂所緣而不取著一切智心最上所緣不應捨離於空所緣審諦伺察一切衆生大悲所緣深生願樂寂慧當知具善巧方便菩薩於般若波羅蜜多清淨所緣法中而得自在無生所緣思惟決定和合生起所緣亦不厭捨無作所緣而復趣入諸有善根施作所緣悉令開曉無相所緣而善思擇菩提心所緣永無厭離無願所緣以慧正觀三界所緣不生厭離菩薩以慧方便於其無生一切所緣法中自在而轉若見不淨所緣即於如來清淨身心中住若無常所緣即於生死無疲倦心住若苦所緣即令一切衆生快樂安置涅槃平等心住若無我所緣即於一切衆生大悲心住若貪所緣即於貪行衆生中以淨大藥開明心住若瞋所緣即於瞋行衆生中以慈大藥開明心住若癡所緣即於癡行衆生中以緣生大藥開明心住若等分所緣即於等分行衆生中以無常想大藥開明心住若離貪所緣即於聲聞法中開化心住若離瞋所緣即於緣覺法中開化心住若離癡所緣即於菩薩法中開化心住若色所緣即於獲得如來最上色相心住若聲所緣即於獲得如來妙好音聲心住若香所緣即於獲得如來戒香清淨心住若味所緣即於獲得如來所有味中上味大人勝相清淨心住若觸所緣即於獲得如來所有細軟手足妙觸心住若法所緣即於獲得如來所有一切法中決定心住若施所緣即於獲得如來最上相好心住若戒所緣即於嚴淨佛土心住若忍所緣即於獲得梵音聲相妙金色身清淨心住若精進所緣即於一切衆生救度心住若定所緣即於神通所起妙用心住若慧所緣即於斷一切衆生煩惱諸見相續心住若慈所緣即於一切衆生起無障礙心住若悲所緣即起護持正法心住若喜所緣即起説法歡喜心住若捨所緣即離諸違順成辦一切衆生事業心住若四攝法所緣即起成熟一切衆生心住
